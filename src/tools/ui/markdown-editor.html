<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 编辑工具</title>
    <style>
        * {
            box-sizing: border-box
        }
        body {
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #1f2937
        }
        .app {
            height: 100vh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }
        .bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background: #fff;
            border-bottom: 1px solid #dbe3ee;
            position: sticky;
            top: 0
        }
        .btn, .sel {
            height: 36px;
            padding: 0 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #fff;
            font: inherit
        }
        .btn {
            cursor: pointer
        }
        .btn:hover {
            background: #f8fafc
        }
        .main {
            flex: 1;
            display: flex;
            min-height: 0
        }
        .pane {
            flex: 1;
            min-width: 0;
            padding: 16px;
            overflow: auto
        }
        .pane--left {
            border-right: 1px solid #dbe3ee
        }
        .app--preview {
            overflow: hidden
        }
        .app--preview .pane--left {
            display: none
        }
        .app--preview .pane {
            width: 100%;
            height: 100%;
            overflow: auto
        }
        .app--preview .preview {
            max-width: 1000px;
            margin: 0 auto
        }
        .app--preview [data-a="new"],
        .app--preview [data-a="open"],
        .app--preview [data-a="md"],
        .app--preview [data-a="html"],
        .app--preview [data-a="pdf"],
        .app--preview [data-a="theme"],
        .app--preview [data-w],
        .app--preview [data-l],
        .app--preview #font,
        .app--preview .status {
            display: none
        }
        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #64748b
        }
        .txt {
            width: 100%;
            height: calc(100vh - 130px);
            border: 0;
            outline: 0;
            resize: none;
            background: transparent;
            color: inherit;
            font: 14px/1.7 Consolas, monospace;
            white-space: pre-wrap
        }
        .preview-shell {
            display: flex;
            gap: 20px;
            align-items: flex-start
        }
        .preview-wrap {
            flex: 1;
            min-width: 0
        }
        .toc {
            width: 240px;
            flex: 0 0 240px;
            position: sticky;
            top: 16px;
            align-self: flex-start;
            max-height: calc(100vh - 120px);
            overflow: auto;
            padding: 14px;
            border: 1px solid #dbe3ee;
            border-radius: 12px;
            background: #fff
        }
        .toc__title {
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #334155
        }
        .toc__empty {
            font-size: 13px;
            color: #94a3b8
        }
        .toc__list {
            margin: 0;
            padding: 0;
            list-style: none
        }
        .toc__item {
            margin: 0
        }
        .toc__item--level-1 .toc__link { padding-left: 0 }
        .toc__item--level-2 .toc__link { padding-left: 12px }
        .toc__item--level-3 .toc__link { padding-left: 24px }
        .toc__item--level-4 .toc__link { padding-left: 36px }
        .toc__item--level-5 .toc__link { padding-left: 48px }
        .toc__item--level-6 .toc__link { padding-left: 60px }
        .toc__link {
            display: block;
            padding: 6px 0;
            color: #475569;
            text-decoration: none;
            font-size: 13px;
            line-height: 1.5;
            border-radius: 6px
        }
        .toc__link:hover {
            color: #2563eb;
            background: #eff6ff
        }
        .toc__link--active {
            color: #1d4ed8;
            background: #dbeafe;
            font-weight: 700
        }
        .toc__link:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px
        }
        .preview-heading {
            scroll-margin-top: 20px
        }
        .preview {
            line-height: 1.8;
            word-break: break-word
        }
        .preview pre {
            overflow: auto;
            padding: 14px;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0
        }
        .preview code {
            padding: 2px 6px;
            border-radius: 6px;
            background: #eef2ff;
            font-family: Consolas, monospace
        }
        .preview pre code {
            padding: 0;
            background: transparent;
            color: inherit
        }
        .preview blockquote {
            margin: 1em 0;
            padding-left: 12px;
            border-left: 4px solid #cbd5e1;
            color: #475569
        }
        .preview table {
            width: 100%;
            border-collapse: collapse
        }
        .preview th, .preview td {
            border: 1px solid #cbd5e1;
            padding: 8px;
            text-align: left
        }
        .status {
            padding: 10px 16px;
            background: #fff;
            border-top: 1px solid #dbe3ee;
            font-size: 12px;
            color: #64748b
        }
        .hide {
            display: none
        }
        .drag {
            outline: 2px dashed #2563eb;
            outline-offset: -6px
        }
        .mermaid-box {
            padding: 12px;
            border-radius: 10px;
            background: #fff;
            overflow: auto
        }
        .dark {
            background: #0f172a;
            color: #e5e7eb
        }
        .dark .bar, .dark .status {
            background: #111827;
            border-color: #334155
        }
        .dark .pane--left {
            border-color: #334155
        }
        .dark .btn, .dark .sel {
            background: #1e293b;
            color: #e5e7eb;
            border-color: #475569
        }
        .dark .label {
            color: #94a3b8
        }
        .dark .preview code {
            background: #1e293b
        }
        .dark .preview blockquote {
            color: #94a3b8;
            border-left-color: #475569
        }
        .dark .mermaid-box {
            background: #111827
        }
        .dark .toc {
            background: #111827;
            border-color: #334155
        }
        .dark .toc__title {
            color: #e2e8f0
        }
        .dark .toc__empty {
            color: #94a3b8
        }
        .dark .toc__link {
            color: #cbd5e1
        }
        .dark .toc__link:hover {
            color: #93c5fd;
            background: #1e293b
        }
        .dark .toc__link--active {
            color: #bfdbfe;
            background: #1d4ed8
        }
        @media (max-width: 1024px) {
            .preview-shell {
                flex-direction: column
            }
            .toc {
                width: 100%;
                flex-basis: auto;
                position: static;
                max-height: none
            }
        }
        @media (max-width: 768px) {
            .app--preview .pane--left {
                display: none
            }
            .app--preview .pane {
                width: 100%
            }
            .main {
                flex-direction: column
            }
            .pane--left {
                border-right: none;
                border-bottom: 1px solid #dbe3ee
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app" id="app">
        <div class="bar" id="bar">
            <button type="button" class="btn" data-a="new">新建</button>
            <button type="button" class="btn" data-a="open">上传</button>
            <button type="button" class="btn" data-a="md">保存 MD</button>
            <button type="button" class="btn" data-a="html">导出 HTML</button>
            <button type="button" class="btn" data-a="pdf">导出 PDF</button>
            <button type="button" class="btn" data-a="preview-mode">预览模式</button>
            <button type="button" class="btn" data-a="theme">切换主题</button>
            <button type="button" class="btn" data-w="**">加粗</button>
            <button type="button" class="btn" data-w="*">斜体</button>
            <button type="button" class="btn" data-w="`">代码</button>
            <button type="button" class="btn" data-l="# ">H1</button>
            <button type="button" class="btn" data-l="- ">列表</button>
            <select id="font" class="sel">
                <option value="12">12px</option>
                <option value="14" selected>14px</option>
                <option value="16">16px</option>
                <option value="18">18px</option>
            </select>
            <input id="file" class="hide" type="file" accept=".md,.markdown,text/plain">
        </div>
        <div class="main">
            <section class="pane pane--left" id="drop">
                <label class="label" for="editor">编辑区（支持拖拽 .md 文件）</label>
                <textarea id="editor" class="txt"></textarea>
            </section>
            <section class="pane">
                <div class="preview-shell">
                    <aside class="toc" id="toc" aria-label="文档目录"></aside>
                    <div class="preview-wrap">
                        <div class="label">预览区</div>
                        <div id="preview" class="preview"></div>
                    </div>
                </div>
            </section>
        </div>
        <div id="status" class="status">就绪</div>
    </div>
    <script>
        'use strict';
        const app = document.getElementById('app');
        const bar = document.getElementById('bar');
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const statusBar = document.getElementById('status');
        const file = document.getElementById('file');
        const drop = document.getElementById('drop');
        const font = document.getElementById('font');
        const toc = document.getElementById('toc');
        let dark = false, rid = 0, previewOnly = false, activeHeadingId = '';
        
        marked.setOptions({ breaks: true, gfm: true });
        
        function esc(t) {
            return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        function setStatus(msg) {
            const t = editor.value;
            const w = t.trim() ? t.trim().split(/\s+/).length : 0;
            const l = t ? t.split('\n').length : 0;
            const modeText = previewOnly ? ' · 当前为预览模式' : '';
            statusBar.textContent = '字符 ' + t.length + ' · 词约 ' + w + ' · 行 ' + l + modeText + (msg ? ' · ' + msg : '');
        }
        
        function applyPreviewMode() {
            app.classList.toggle('app--preview', previewOnly);
            updateActiveHeading();
        }
        
        function parseMd(t) {
            return typeof marked.parse === 'function' ? marked.parse(t) : marked(t);
        }
        
        function renderMermaid() {
            if (typeof mermaid === 'undefined') return;
            const id = ++rid;
            mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: dark ? 'dark' : 'default' });
            preview.querySelectorAll('pre code.language-mermaid').forEach(function(node, i) {
                const pre = node.closest('pre');
                const src = node.textContent.trim();
                if (!pre || !src) return;
                const box = document.createElement('div');
                box.className = 'mermaid-box';
                pre.replaceWith(box);
                mermaid.render('m-' + id + '-' + i, src).then(function(r) {
                    if (id === rid && box.isConnected) box.innerHTML = r.svg;
                }).catch(function(e) {
                    box.innerHTML = '<div>Mermaid 渲染失败：' + esc(e && e.message ? e.message : '语法错误') + '</div>';
                });
            });
        }

        function slugifyHeading(text) {
            return String(text)
                .toLowerCase()
                .trim()
                .replace(/<[^>]*>/g, '')
                .replace(/[\u0000-\u001f]/g, '')
                .replace(/\s+/g, '-')
                .replace(/[^\w\-\u4e00-\u9fa5]/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
        }

        function applyHeadingAnchors() {
            const headings = Array.from(preview.querySelectorAll('h1,h2,h3,h4,h5,h6'));
            const slugMap = new Map();
            return headings.map(function(node, index) {
                const text = node.textContent.trim();
                const level = Number(node.tagName.slice(1));
                const baseSlug = slugifyHeading(text) || ('section-' + (index + 1));
                const count = slugMap.get(baseSlug) || 0;
                slugMap.set(baseSlug, count + 1);
                const id = count === 0 ? baseSlug : (baseSlug + '-' + (count + 1));
                node.id = id;
                node.classList.add('preview-heading');
                return {
                    id: id,
                    text: text || ('未命名标题 ' + (index + 1)),
                    level: level
                };
            });
        }

        function getPreviewScrollContainer() {
            const pane = preview.closest('.pane');
            return pane || app;
        }

        function setActiveTocLink(id) {
            activeHeadingId = id || '';
            toc.querySelectorAll('.toc__link').forEach(function(link) {
                const isActive = link.getAttribute('data-heading-id') === activeHeadingId;
                link.classList.toggle('toc__link--active', isActive);
                if (isActive) {
                    link.setAttribute('aria-current', 'location');
                    keepActiveTocLinkInView(link);
                } else {
                    link.removeAttribute('aria-current');
                }
            });
        }

        function keepActiveTocLinkInView(link) {
            if (!link) {
                return;
            }
            const linkTop = link.offsetTop;
            const linkBottom = linkTop + link.offsetHeight;
            const viewTop = toc.scrollTop;
            const viewBottom = viewTop + toc.clientHeight;
            const offset = 12;
            if (linkTop < viewTop + offset) {
                toc.scrollTo({ top: Math.max(0, linkTop - offset), behavior: 'smooth' });
            } else if (linkBottom > viewBottom - offset) {
                toc.scrollTo({
                    top: linkBottom - toc.clientHeight + offset,
                    behavior: 'smooth'
                });
            }
        }

        function updateActiveHeading() {
            const items = Array.from(preview.querySelectorAll('.preview-heading'));
            if (!items.length) {
                setActiveTocLink('');
                return;
            }
            const container = getPreviewScrollContainer();
            if (!container) {
                setActiveTocLink(items[0].id || '');
                return;
            }
            const containerRect = container.getBoundingClientRect();
            const thresholdTop = containerRect.top + 28;
            let currentId = items[0].id || '';
            items.forEach(function(node) {
                const rect = node.getBoundingClientRect();
                if (rect.top - thresholdTop <= 0) {
                    currentId = node.id;
                }
            });
            setActiveTocLink(currentId);
        }

        function scrollToHeading(id) {
            const heading = document.getElementById(id);
            if (!heading || !preview.contains(heading)) {
                return;
            }
            const container = getPreviewScrollContainer();
            if (!container) {
                heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                return;
            }
            const containerRect = container.getBoundingClientRect();
            const headingRect = heading.getBoundingClientRect();
            const targetTop = container.scrollTop + headingRect.top - containerRect.top - 12;
            setActiveTocLink(id);
            container.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
        }

        function renderToc(items) {
            if (!items.length) {
                activeHeadingId = '';
                toc.innerHTML = '<div class="toc__title">文档目录</div><div class="toc__empty">当前文档暂无标题</div>';
                return;
            }
            toc.innerHTML = '<div class="toc__title">文档目录</div><ol class="toc__list">' + items.map(function(item) {
                const activeClass = item.id === activeHeadingId ? ' toc__link--active' : '';
                return '<li class="toc__item toc__item--level-' + item.level + '"><a class="toc__link' + activeClass + '" href="#' + item.id + '" data-heading-id="' + item.id + '">' + esc(item.text) + '</a></li>';
            }).join('') + '</ol>';
            toc.querySelectorAll('.toc__link').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const id = link.getAttribute('data-heading-id');
                    setActiveTocLink(id);
                    scrollToHeading(id);
                });
            });
            updateActiveHeading();
        }
        
        function update(msg) {
            try {
                preview.innerHTML = DOMPurify.sanitize(parseMd(editor.value), { USE_PROFILES: { html: true } });
                renderToc(applyHeadingAnchors());
                renderMermaid();
                requestAnimationFrame(updateActiveHeading);
            } catch (e) {
                preview.innerHTML = '<p>预览失败：' + esc(e && e.message ? e.message : String(e)) + '</p>';
                renderToc([]);
            }
            setStatus(msg || '');
        }
        
        function wrap(token) {
            const s = editor.selectionStart;
            const e = editor.selectionEnd;
            const v = editor.value;
            const m = v.slice(s, e);
            editor.value = v.slice(0, s) + token + m + token + v.slice(e);
            editor.focus();
            editor.selectionStart = s + token.length;
            editor.selectionEnd = e + token.length;
            update('已插入格式');
        }
        
        function line(prefix) {
            const p = editor.selectionStart;
            const v = editor.value;
            const ls = v.lastIndexOf('\n', p - 1) + 1;
            editor.value = v.slice(0, ls) + prefix + v.slice(ls);
            editor.focus();
            editor.selectionStart = ls + prefix.length;
            editor.selectionEnd = ls + prefix.length;
            update('已插入格式');
        }
        
        function down(name, type, text) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([text], { type: type }));
            a.download = name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(function() {
                URL.revokeObjectURL(a.href);
            }, 300);
        }
        
        function exportHtml() {
            const html = [
                '<!DOCTYPE html>',
                '<html lang="zh-CN">',
                '<head>',
                '<meta charset="UTF-8">',
                '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
                '<title>Markdown导出</title>',
                '<style>body{font-family:"Microsoft YaHei",sans-serif;line-height:1.8;margin:32px;color:#111827}pre{padding:14px;border-radius:10px;overflow:auto;background:#0f172a;color:#e2e8f0}code{padding:2px 6px;border-radius:6px;background:#eef2ff;font-family:Consolas,monospace}pre code{padding:0;background:transparent;color:inherit}blockquote{margin:1em 0;padding-left:12px;border-left:4px solid #cbd5e1;color:#475569}table{width:100%;border-collapse:collapse}th,td{border:1px solid #cbd5e1;padding:8px;text-align:left}</style>',
                '</head>',
                '<body>',
                preview.innerHTML,
                '</body>',
                '</html>'
            ].join('\n');
            down('document.html', 'text/html;charset=utf-8', html);
            setStatus('已导出 HTML');
        }
        
        async function exportPdf() {
            if (!window.jspdf || !window.jspdf.jsPDF) {
                setStatus('PDF 依赖加载失败');
                return;
            }
            if (typeof html2canvas === 'undefined') {
                setStatus('截图依赖加载失败');
                return;
            }

            const jsPDF = window.jspdf.jsPDF;
            const previousPreviewMode = previewOnly;

            if (!previewOnly) {
                previewOnly = true;
                applyPreviewMode();
                update('');
            }

            await new Promise(function(resolve) {
                window.setTimeout(resolve, 180);
            });

            const exportHost = document.createElement('div');
            const exportPreview = document.createElement('div');
            const previewRect = preview.getBoundingClientRect();
            const exportWidth = Math.max(720, Math.ceil(previewRect.width || preview.scrollWidth || 800));

            exportHost.style.position = 'fixed';
            exportHost.style.left = '-100000px';
            exportHost.style.top = '0';
            exportHost.style.width = exportWidth + 'px';
            exportHost.style.padding = '0';
            exportHost.style.margin = '0';
            exportHost.style.background = dark ? '#0f172a' : '#ffffff';
            exportHost.style.zIndex = '-1';

            exportPreview.className = preview.className;
            exportPreview.style.width = exportWidth + 'px';
            exportPreview.style.maxWidth = 'none';
            exportPreview.style.margin = '0';
            exportPreview.style.padding = '0';
            exportPreview.style.background = dark ? '#0f172a' : '#ffffff';
            exportPreview.innerHTML = preview.innerHTML;
            exportHost.appendChild(exportPreview);
            document.body.appendChild(exportHost);

            try {
                const canvas = await html2canvas(exportPreview, {
                    backgroundColor: dark ? '#0f172a' : '#ffffff',
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    scrollX: 0,
                    scrollY: 0,
                    windowWidth: exportWidth,
                    windowHeight: exportPreview.scrollHeight
                });

                const pdf = new jsPDF({
                    orientation: 'p',
                    unit: 'pt',
                    format: 'a4'
                });

                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                const margin = 24;
                const usableWidth = pageWidth - margin * 2;
                const usableHeight = pageHeight - margin * 2;
                const pageHeightCss = usableHeight * exportWidth / usableWidth;
                const scaleRatio = canvas.width / exportWidth;
                const blockNodes = Array.from(exportPreview.children);
                const pageBreaks = [];
                let startCss = 0;
                const totalHeightCss = exportPreview.scrollHeight;

                while (startCss < totalHeightCss - 1) {
                    const desiredEndCss = Math.min(startCss + pageHeightCss, totalHeightCss);
                    let breakCss = desiredEndCss;

                    for (let i = 0; i < blockNodes.length; i += 1) {
                        const node = blockNodes[i];
                        const nodeTop = node.offsetTop;
                        const nodeBottom = nodeTop + node.offsetHeight;
                        if (nodeBottom <= desiredEndCss && nodeBottom > startCss + 40) {
                            breakCss = nodeBottom;
                        }
                        if (nodeTop >= desiredEndCss) {
                            break;
                        }
                    }

                    if (breakCss <= startCss + 20) {
                        breakCss = desiredEndCss;
                    }

                    pageBreaks.push({
                        start: startCss,
                        end: breakCss
                    });
                    startCss = breakCss;
                }

                pageBreaks.forEach(function(section, index) {
                    if (index > 0) {
                        pdf.addPage();
                    }

                    const sliceStartPx = Math.floor(section.start * scaleRatio);
                    const sliceHeightPx = Math.max(1, Math.ceil((section.end - section.start) * scaleRatio));
                    const pageCanvas = document.createElement('canvas');
                    const pageContext = pageCanvas.getContext('2d');
                    pageCanvas.width = canvas.width;
                    pageCanvas.height = sliceHeightPx;

                    pageContext.fillStyle = dark ? '#0f172a' : '#ffffff';
                    pageContext.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
                    pageContext.drawImage(
                        canvas,
                        0,
                        sliceStartPx,
                        canvas.width,
                        sliceHeightPx,
                        0,
                        0,
                        canvas.width,
                        sliceHeightPx
                    );

                    const pageImageHeight = sliceHeightPx * usableWidth / canvas.width;
                    const pageImage = pageCanvas.toDataURL('image/png');
                    pdf.addImage(pageImage, 'PNG', margin, margin, usableWidth, pageImageHeight, undefined, 'FAST');
                });

                pdf.save('document.pdf');
                setStatus('已导出预览区 PDF');
            } catch (error) {
                console.error(error);
                setStatus('PDF 导出失败');
            } finally {
                document.body.removeChild(exportHost);
                if (!previousPreviewMode) {
                    previewOnly = false;
                    applyPreviewMode();
                    update('');
                }
            }
        }
        
        function readFile(f) {
            if (!f) return;
            if (f.size > 10 * 1024 * 1024) {
                setStatus('文件超过 10MB');
                return;
            }
            const r = new FileReader();
            r.onload = function(e) {
                editor.value = e.target.result;
                update('已载入：' + f.name);
            };
            r.onerror = function() {
                setStatus('文件读取失败');
            };
            r.readAsText(f);
        }
        
        editor.addEventListener('input', function() {
            update('');
        });
        
        editor.addEventListener('keydown', function(e) {
            const mod = e.ctrlKey || e.metaKey;
            if (!mod) return;
            if (e.key === 'b') {
                e.preventDefault();
                wrap('**');
            } else if (e.key === 'i') {
                e.preventDefault();
                wrap('*');
            } else if (e.key === 's') {
                e.preventDefault();
                down('document.md', 'text/markdown;charset=utf-8', editor.value);
                setStatus('已保存 MD');
            }
        });
        
        font.addEventListener('change', function() {
            editor.style.fontSize = font.value + 'px';
            preview.style.fontSize = font.value + 'px';
        });
        preview.closest('.pane').addEventListener('scroll', updateActiveHeading, { passive: true });
        window.addEventListener('resize', updateActiveHeading);
        
        bar.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            const a = btn.getAttribute('data-a');
            const w = btn.getAttribute('data-w');
            const l = btn.getAttribute('data-l');
            if (w) {
                wrap(w);
                return;
            }
            if (l) {
                line(l);
                return;
            }
            if (a === 'new') {
                if (!editor.value.trim() || window.confirm('当前内容未保存，确定清空？')) {
                    editor.value = '';
                    update('已新建空白文档');
                }
            } else if (a === 'open') {
                file.click();
            } else if (a === 'md') {
                down('document.md', 'text/markdown;charset=utf-8', editor.value);
                setStatus('已保存 MD');
            } else if (a === 'html') {
                exportHtml();
            } else if (a === 'pdf') {
                exportPdf();
            } else if (a === 'preview-mode') {
                previewOnly = !previewOnly;
                applyPreviewMode();
                update(previewOnly ? '已切换到预览模式' : '已退出预览模式');
            } else if (a === 'theme') {
                dark = !dark;
                app.classList.toggle('dark', dark);
                update('已切换主题');
            }
        });
        
        file.addEventListener('change', function(e) {
            readFile(e.target.files[0]);
            file.value = '';
        });
        
        drop.addEventListener('dragover', function(e) {
            e.preventDefault();
            drop.classList.add('drag');
        });
        
        drop.addEventListener('dragleave', function(e) {
            e.preventDefault();
            drop.classList.remove('drag');
        });
        
        drop.addEventListener('drop', function(e) {
            e.preventDefault();
            drop.classList.remove('drag');
            readFile(e.dataTransfer.files[0]);
        });
        
        editor.value = [
            '# Markdown 编辑工具',
            '',
            '这是一个单文件页面，不依赖项目内其他文件。',
            '',
            '## 功能',
            '- 实时预览',
            '- 上传 .md 文件',
            '- 导出 MD / HTML / PDF',
            '- Mermaid 图表预览',
            '- 单独预览模式',
            '',
            '```mermaid',
            'flowchart TD',
            '  A[开始] --> B[输入 Markdown]',
            '  B --> C[实时预览]',
            '  C --> D[切换到单独预览模式]',
            '```'
        ].join('\n');
        
        applyPreviewMode();
        update('当前页面已内置全部逻辑');
    </script>
</body>
</html>
